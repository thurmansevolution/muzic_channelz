services:
  muzic-channelz:
    image: muzic-channelz:1.0
    build: .
    ports:
      - "8484:8484"
    environment:
      - MUZIC_PORT=8484
      # Host IP for M3U/YML downloadable URLs (e.g. 192.168.1.100). Omit to use auto-detected IP.
      #- MUZIC_PUBLIC_HOST=
      # Set to 0 to use hardware encoding. For NVIDIA set deploy below; for Intel/AMD use devices instead.
      - MUZIC_FFMPEG_FORCE_SOFTWARE=1
      # VAAPI driver name: i965 for older Intel (Gen4-Gen9), iHD for newer (Gen8+).
      # Default in the image is i965. Uncomment to override:
      # - LIBVA_DRIVER_NAME=iHD
    # NVIDIA (NVENC) - requires NVIDIA Container Toolkit installed on the host:
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]
    # Intel/AMD (VAAPI) - use this instead of deploy above, and set MUZIC_FFMPEG_FORCE_SOFTWARE=0:
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add so the container can open /dev/dri/renderD128 (host render group, often 107):
    # group_add:
    #   - "107"
    volumes:
      - muzic-data:/app/data
    restart: unless-stopped

volumes:
  muzic-data: {}
